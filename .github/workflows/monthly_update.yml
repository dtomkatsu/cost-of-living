name: Monthly Price Update
on:
  schedule:
    - cron: '0 10 1 * *'  # 1st of each month, 10:00 UTC (midnight HST)
  workflow_dispatch:        # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch CPI and update prices
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: python scripts/update_prices.py

      - name: Commit updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/ data/cpi_cache/
          git diff --staged --quiet || git commit -m "Monthly price update $(date +%Y-%m)"
          git push
